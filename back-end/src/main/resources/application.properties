spring.application.name=managesys

############################################
# 로그인 히스토리 자동 정리 (분기별)
# dump-path: 덤프 CSV 파일이 저장될 디렉토리 경로 (직접 지정)
############################################
app.login-history.dump-path=C:/managesys/dumps

############################################
# DevTools - 재시작 시 "web application stopped already" 오류 나면 true 로 변경 후 사용
############################################
spring.devtools.restart.enabled=false

############################################
# Server
############################################
server.port=8085

############################################
# MariaDB Datasource (JDBC)
############################################
spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.datasource.url=jdbc:log4jdbc:mariadb://localhost:3307/managesys
spring.datasource.username=root
spring.datasource.password=1234

############################################
# JPA / Hibernate
############################################
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

####################################
# MyBatis
####################################
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.sys.managesys.common.dto
mybatis.configuration.map-underscore-to-camel-case=true

############################################
# Connection Pool (HikariCP)
############################################
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

############################################
# Logging
############################################
logging.level.org.mybatis=DEBUG
logging.level.org.mybatis.spring.SqlSessionUtils=DEBUG
logging.level.org.mybatis.spring.SqlSessionTemplate=DEBUG

logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
